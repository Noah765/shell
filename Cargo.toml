[package]
name = "shell"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = "0.4.44"
iced = { git = "https://github.com/pop-os/iced", version = "0.14.0", default-features = false, features = ["image", "tokio", "wayland", "wgpu", "winit"] }
rustix = { version = "0.38", features = ["fs"] } # Required for iced to compile without tiny-skia
smithay-client-toolkit = "0.20.0"

[features]
debug = ["iced/hot", "iced/time-travel"]
